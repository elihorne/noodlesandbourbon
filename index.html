<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noodles and Bourbon</title>
    <link rel="icon" href="/img/favicon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #fff;
        color: #1a1a2e;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .stamp {
        width: 260px;
        max-width: 80vw;
        margin-bottom: 2rem;
        opacity: 0.9;
      }
      .name {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 0.75rem;
      }
      .tagline {
        font-size: 1rem;
        color: #555;
        line-height: 1.6;
        max-width: 360px;
      }
      .tagline a {
        color: #3b5fe0;
        text-decoration: none;
      }
      .tagline a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <img src="/img/header-stamp.png" alt="Noodles and Bourbon" class="stamp" />
    <p class="name">Noodles &amp; Bourbon</p>
    <p class="tagline">Liz &amp; Eli's corner of the internet.</p>
  </body>
</html>
